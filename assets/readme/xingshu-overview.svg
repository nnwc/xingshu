    <text x="532" y="270" fill="#BAE6FD" font-family="Noto Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600">统一调度 · 统一执行 · 统一追踪</text>
    <rect x="532" y="312" width="215" height="18" rx="9" fill="#38BDF8" fill-opacity="0.75"/>
    <rect x="532" y="352" width="255" height="18" rx="9" fill="#818CF8" fill-opacity="0.65"/>
  </g>

  <path d="M850 285H960" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>
  <path d="M960 285L940 273V297L960 285Z" fill="#60A5FA"/>

