    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1E293B" flood-opacity="0.12"/></filter>
    <style>.title{font:700 30px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#0F172A}.body{font:500 20px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#475569}.small{font:600 18px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#2563EB}</style>
